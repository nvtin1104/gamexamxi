name = "gamexamxi-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:8787,http://127.0.0.1:3000,http://127.0.0.1:8787"
JWT_SECRET = "dev_jwt_secret_change_me"
GOOGLE_CLIENT_ID = ""
R2_PUBLIC_URL="https://pub-04d55232d6c541cfb9cf169caa8d9604.r2.dev"

[[d1_databases]]
binding = "DB"
database_name = "gamexamxi-db"
database_id = "a4affb5a-d73a-41f2-b8b4-672438b45a98"
migrations_dir = "./drizzle"

# Dev-only database (sử dụng khi dev --remote)
# [[d1_databases]]
# binding = "DB_DEV"
# database_name = "gamexamxi-db-dev"
# database_id = "a4affb5a-d73a-41f2-b8b4-672438b45a98"
# remote = true

[[kv_namespaces]]
binding = "CACHE"
id = "82eafd2ca8df40cb9b984cabc2e7e12f"
preview_id = "82eafd2ca8df40cb9b984cabc2e7e12f"

[[kv_namespaces]]
binding = "SESSIONS"
id = "2401b7c9c8394a21bb906f89270cbe23"
preview_id = "2401b7c9c8394a21bb906f89270cbe23"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "gamexamxi-storage"
preview_bucket_name = "gamexamxi-storage-dev"

# Dev-only R2 (sử dụng khi dev --remote)
# [[r2_buckets]]
# binding = "STORAGE_DEV"
# bucket_name = "gamexamxi-storage-dev"

[[queues.producers]]
binding = "POINTS_QUEUE"
queue = "gamexamxi-points-queue"

[[queues.producers]]
binding = "ACHIEVEMENTS_QUEUE"
queue = "gamexamxi-achievements-queue"

[[queues.producers]]
binding = "NOTIFICATIONS_QUEUE"
queue = "gamexamxi-notifications-queue"

[[queues.consumers]]
queue = "gamexamxi-points-queue"
max_batch_size = 10

[[queues.consumers]]
queue = "gamexamxi-achievements-queue"
max_batch_size = 5

[[queues.consumers]]
queue = "gamexamxi-notifications-queue"
max_batch_size = 20

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"
script_name = "gamexamxi-api"

[[durable_objects.bindings]]
name = "GROUP_ROOM"
class_name = "GroupRoom"
script_name = "gamexamxi-api"

[[durable_objects.bindings]]
name = "POINTS_LEDGER"
class_name = "PointsLedger"
script_name = "gamexamxi-api"

[triggers]
crons = ["0 * * * *"]
