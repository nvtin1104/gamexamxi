name = "gamexamxi-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "http://localhost:4321,http://localhost:5173,http://127.0.0.1:4321,http://127.0.0.1:5173"
JWT_SECRET = "dev_jwt_secret_change_me"
GOOGLE_CLIENT_ID = ""

[[d1_databases]]
binding = "DB"
database_name = "gamexamxi-db"
database_id = "placeholder-replace-after-creation"
migrations_dir = "./drizzle"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-replace-after-creation"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-replace-after-creation"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "gamexamxi-storage"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "gamexamxi-job-queue"

[[queues.consumers]]
queue = "gamexamxi-job-queue"
max_batch_size = 10

[triggers]
crons = ["0 * * * *"]
